services:
  postgres-cfelbd-dev:
    image: postgres:16-alpine
    container_name: postgres-cfelbd-dev
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5438:5432"
    volumes:
      - postgres-cfelbd-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orghub-cfl-dev-network
    restart: unless-stopped

  orghub-cfl-dev-api:
    image: orghub-api:latest
    container_name: orghub-cfl-dev-api
    environment:
      - ASPNETCORE_ENVIRONMENT=CFLDev
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres-cfelbd-dev;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
    ports:
      - "127.0.0.1:5180:8080"
    depends_on:
      postgres-cfelbd-dev:
        condition: service_healthy
    networks:
      - orghub-cfl-dev-network
    restart: unless-stopped

volumes:
  postgres-cfelbd-dev-data:

networks:
  orghub-cfl-dev-network:
    driver: bridge
