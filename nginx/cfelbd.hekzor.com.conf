server {
    listen 80;
    server_name cfelbd.hekzor.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cfelbd.hekzor.com;

    ssl_certificate     /etc/nginx/ssl/cfelbd.hekzor.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/cfelbd.hekzor.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    access_log /opt/platform/logs/nginx/cfelbd-access.log;
    error_log  /opt/platform/logs/nginx/cfelbd-error.log;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # API reverse proxy → Docker container on host port 5178
    location / {
        proxy_pass http://127.0.0.1:5178;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
    }

    # Add web frontend proxy here later (e.g., port 5179)
    # location / {
    #     proxy_pass http://127.0.0.1:5179;
    #     ...
    # }
}
