version: "3.8"

services:
  civilERP-db:
    image: postgres:16
    container_name: orgHub-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Admin1234!
      POSTGRES_DB: orgHub
    ports:
      - "5433:5432"
    volumes:
      - civilERP-data:/var/lib/postgresql/data
      - ./backups:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orgHub"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  civilERP-data:
    driver: local
